services:

  app:
    build: .
    container_name: nodesjs-app	
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql-db
      DB_USER: amr
      DB_PASSWORD: amr123
    volumes:
      - app_log:/app/log
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ivolve
      MYSQL_USER: amr
      MYSQL_PASSWORD: amr123
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  app_log: